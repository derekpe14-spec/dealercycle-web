<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DealerCycle — Order</title>
<link rel="icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&display=swap">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app" style="padding:14px 0"></div>
<script>
"use strict";
var TOKEN = location.pathname.split("/o/")[1] || "";
var B = null;            // bootstrap
var cart = {};           // product_id -> qty
var step = "shop";       // shop | review | conf
var openCat = null;
var lastBags = 0;
var appScreen = "order"; // order | history
var invHistory = null;   // customer's invoice history

function money(n){ return "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function bagSvg(hex,sz){ sz=sz||1; var w=24*sz,h=28*sz;
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 24 28" style="flex-shrink:0"><path d="M4 6 Q12 1 20 6 L20 24 Q20 26.5 17.5 26.5 L6.5 26.5 Q4 26.5 4 24 Z" fill="'+hex+'" stroke="rgba(0,0,0,.28)" stroke-width="1"/><rect x="8" y="10" width="8" height="7" rx="1.5" fill="rgba(255,255,255,.85)" stroke="rgba(0,0,0,.12)" stroke-width=".5"/></svg>'; }
function prod(id){ return B.products.find(function(p){return p.id===id;}); }
/* Verified Umbarger product-page slugs (from umbargershowfeeds.com sitemap), keyed by product id.
   Products not listed (VitaFerm minerals, bedding, commodities, items with no Umbarger page) show no link. */
var UMB_SLUG={
  ca1:"primer-plus",ca2:"breeder-grower",ca3:"cattle-blaster",ca4:"light-em-up",ca5:"barley-base",ca6:"payload",ca7:"launch",ca8:"cattlelac",ca9:"show-ready",ca10:"synurgy",ca11:"beef-grower-11",ca12:"calf-starter",ca13:"dairy-beef-em-up",
  la1:"lamb-19",la2:"lamb-17-with-barley",la3:"lamb-16-hi-energy",la5:"lamb-creep-19",la6:"lamb-creep-18",
  go1:"meat-goat-grower-16",go2:"fusion",go3:"meat-goat-creep-18",go4:"commercial-goat-16",go6:"crossfire",go7:"next-level",go8:"prevail",
  re1:"dynamic",
  sw1:"clutch",sw2:"clutch",sw3:"pedal-down",sw4:"spotlight",sw5:"massive",sw6:"sow-gestation",sw7:"sow-lactation",sw8:"xcel",sw9:"cool-down",sw11:"umbarger-hi-energy-fat-supplement",sw12:"freedom-base-plus",sw13:"sow-base",
  ho1:"textured-12",ho2:"endurance-no-corn",ho3:"top-class",
  po1:"layer-16",
  ex1:"bulletproof",ex3:"change-up",ex4:"cobboom",ex6:"fullback",ex8:"loaded",ex9:"apex",ex19:"star-glo"
};
/* BioZyme family (VitaFerm / DuraFerm / Sure Champ) — verified product-line pages (no per-SKU pages exist). */
var EXTRA_URL={
  vf1:"https://surechamp.com/",vf2:"https://surechamp.com/",vf3:"https://surechamp.com/",vf18:"https://surechamp.com/",vf20:"https://surechamp.com/",
  vf4:"https://duraferm.com/products/goat-products/",vf5:"https://duraferm.com/products/goat-products/",
  vf6:"https://duraferm.com/products/sheep-products/",vf7:"https://duraferm.com/products/sheep-products/",vf8:"https://duraferm.com/products/sheep-products/",
  vf9:"https://vitaferm.com/product-categories/vita-charge-products/",vf10:"https://vitaferm.com/product-categories/vita-charge-products/",vf11:"https://vitaferm.com/product-categories/vita-charge-products/",vf12:"https://vitaferm.com/product-categories/vita-charge-products/",vf24:"https://vitaferm.com/product-categories/vita-charge-products/",
  vf13:"https://vitaferm.com/product-categories/concept-aid-products-protein/",vf21:"https://vitaferm.com/product-categories/concept-aid-products-protein/",
  vf14:"https://vitaferm.com/product-categories/cattlemans-blend-products/",
  vf15:"https://vitaferm.com/product-categories/concept-aid-products/",vf16:"https://vitaferm.com/product-categories/concept-aid-products/",vf17:"https://vitaferm.com/product-categories/concept-aid-products/",
  vf19:"https://vitaferm.com/product-categories/vitaferm-heat-products/",
  vf22:"https://vitaferm.com/product-categories/gain-smart-products/"
};
function umbargerUrl(p){ if(p.info_url) return p.info_url; if(EXTRA_URL[p.id]) return EXTRA_URL[p.id]; var s=UMB_SLUG[p.id]; return s?("https://umbargershowfeeds.com/"+s+"/"):""; }
function totalBags(){ var s=0; for(var k in cart) s+=cart[k]; return s; }
function cartTotal(){ var t=0; for(var k in cart){ t+=cart[k]*prod(k).allIn; } return t; }

function load(){
  fetch("/api/bootstrap?token="+encodeURIComponent(TOKEN)).then(function(r){return r.json();}).then(function(d){
    if(d.error){ document.getElementById("app").innerHTML='<div class="bigerr"><h2 style="color:var(--navy)">Link not recognized</h2><p class="muted" style="margin-top:8px">This order link is invalid or has been turned off. Please check with your dealer.</p></div>'; return; }
    B=d; cart=Object.assign({},d.myItems||{}); openCat=d.categoryOrder[0];
    render();
  }).catch(function(){ document.getElementById("app").innerHTML='<div class="bigerr"><h2>Connection problem</h2><p class="muted">Please try again.</p></div>'; });
}

function goHistory(){
  appScreen="history";
  document.getElementById("app").innerHTML='<div class="phone"><div class="conf"><p class="muted" style="padding:30px">Loading your invoices…</p></div></div>';
  fetch("/api/my-history?token="+encodeURIComponent(TOKEN)).then(function(r){return r.json();}).then(function(d){
    if(appScreen!=="history") return;
    invHistory=d; renderHistory();
  }).catch(function(){ document.getElementById("app").innerHTML='<div class="bigerr"><h2>Couldn\'t load invoices</h2><p class="muted">Please try again.</p></div>'; });
}
function backToOrder(){ appScreen="order"; render(); }
function renderHistory(){
  var d=invHistory||{years:[],invoices:[],customer:B?B.customer:{name:""},dealer:B?B.dealer:""};
  var years=(d.years||[]).map(function(y){
    return '<div class="selbar" style="display:block;text-align:left;margin-bottom:8px"><div><b>'+esc(y.year)+'</b> — '+money(y.total)+' total · '+y.count+' order'+(y.count===1?'':'s')+'</div>'+
      '<div class="muted" style="font-size:12px;margin-top:2px">Paid '+money(y.paid)+' · Outstanding '+money(y.unpaid)+'</div></div>';
  }).join("") || '<p class="muted" style="font-size:13px">No invoices yet.</p>';
  var rows=(d.invoices||[]).map(function(v){
    var status=v.paid?'<span style="color:var(--green)">Paid'+(v.date_paid?' '+esc(v.date_paid):'')+'</span>':'<span style="color:var(--amber)">Unpaid</span>';
    return '<div class="ri"><div><b>'+esc(v.invoice_num)+'</b><div class="q">'+esc(v.cycle_label)+' · '+esc(v.date_issued)+' · '+status+'</div></div>'+
      '<div style="text-align:right">'+money(v.total)+'<div><a href="/invoice/'+v.id+'" target="_blank" style="font-size:12px;color:var(--blue);text-decoration:underline">View / PDF</a></div></div></div>';
  }).join("");
  var html='<div class="phone"><div class="phead"><h1>Your invoices</h1><div class="sub">'+esc(d.customer.name)+' · '+esc(d.dealer)+'</div></div>'+
    '<div class="pbody">'+
    '<h2 class="sec" style="margin-top:0">Year totals (for taxes)</h2>'+years+
    '<h2 class="sec" style="margin-top:16px">All invoices</h2>'+(rows||'<p class="muted" style="font-size:13px">No invoices yet.</p>')+
    '<p class="muted" style="font-size:12px;margin-top:12px">Open any invoice to print it or save it as a PDF for your records.</p>'+
    '</div>'+
    '<div class="cartbar"><button class="btn ghost" onclick="backToOrder()">&larr; Back to order</button></div></div>';
  document.getElementById("app").innerHTML=html;
}
function render(){
  if(appScreen==="history") return renderHistory();
  if(step==="conf") return renderConf();
  if(step==="review") return renderReview();
  var win=B.window.open;
  var head='<div class="phead">'+
    '<div class="logo"><span class="emblem"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#F5EEDD" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg></span><span class="brandmark" style="font-size:18px;color:#fff">DealerCycle</span></div>'+
    '<h1 style="margin-top:9px">'+esc(B.dealer)+'</h1><div class="sub">Ordering as '+esc(B.customer.name)+' · <span style="text-decoration:underline;cursor:pointer" onclick="goHistory()">My invoices</span></div>'+
    '<div class="cyclebar '+(win?'':'closed')+'"><span class="pulse"></span> '+(win?('Cycle <b style="margin:0 4px">OPEN</b> · delivers '+esc(B.cycle.label)+' · closes '+esc(B.cycle.close_day)+' '+esc(B.cycle.close_time)):'Ordering is <b style="margin:0 4px">CLOSED</b> right now')+'</div></div>';
  var note = B.submitted ? '<div class="selbar"><div>You have an order on this cycle — edit it below and re-submit.</div></div>' : '';
  var cats="";
  B.categoryOrder.forEach(function(name){
    var items=B.products.filter(function(p){return p.category===name;});
    if(!items.length) return;
    var open=openCat===name;
    var rows=items.map(function(p){
      var q=cart[p.id]||0; var iu=umbargerUrl(p);
      return '<div class="prod"><div class="pinfo">'+bagSvg(p.bag_hex)+'<div><div class="pn">'+esc(p.name)+'</div>'+
        '<div class="pp"><b>'+money(p.allIn)+'</b>/bag <span class="muted">· '+esc(p.size)+(p.bag_color_name?' · '+esc(p.bag_color_name)+' bag':'')+'</span></div>'+
        (iu?'<a class="pinfo-link" href="'+iu+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">Product info &#8599;</a>':'')+'</div></div>'+
        '<div class="step"><button id="m_'+p.id+'" onclick="bump(\''+p.id+'\',-1)" '+(q===0?'disabled':'')+(win?'':' disabled')+'>&minus;</button>'+
        '<span class="q" id="q_'+p.id+'">'+q+'</span><button onclick="bump(\''+p.id+'\',1)" '+(win?'':'disabled')+'>+</button></div></div>';
    }).join("");
    cats+='<div class="cat'+(open?' open':'')+'"><div class="cat-h" onclick="toggleCat(\''+esc(name)+'\')">'+
      '<div class="l"><span class="swatch" style="background:'+(B.categoryColors[name]||'#888')+'"></span>'+esc(name)+'</div>'+
      '<div style="display:flex;align-items:center;gap:10px"><span class="cnt">'+items.length+'</span><span class="chev">&#9654;</span></div></div>'+
      '<div class="cat-body">'+rows+'</div></div>';
  });
  var bags=totalBags();
  var html='<div class="phone">'+head+'<div class="pbody">'+note+cats+'</div>'+
    '<div class="cartbar"><div class="ct" id="cartCt">'+bags+' bag'+(bags===1?'':'s')+'<b>'+money(cartTotal())+'</b></div>'+
    '<button class="btn primary" id="reviewBtn" '+(bags>0&&win?'':'disabled')+' onclick="goReview()">Review &rarr;</button></div></div>';
  document.getElementById("app").innerHTML=html;
}
function toggleCat(n){ openCat=(openCat===n?"":n); render(); }
function bump(id,d){
  if(!B.window.open) return;
  var q=(cart[id]||0)+d; if(q<=0){ q=0; delete cart[id]; } else cart[id]=q;
  var qs=document.getElementById('q_'+id); if(qs) qs.textContent=q;          // update just this product's count
  var mb=document.getElementById('m_'+id); if(mb) mb.disabled=(q===0);       // enable/disable its minus button
  updateCartBar();                                                          // no full re-render -> no scroll jump
}
function updateCartBar(){
  var bags=totalBags();
  var ct=document.getElementById('cartCt'); if(ct) ct.innerHTML=bags+' bag'+(bags===1?'':'s')+'<b>'+money(cartTotal())+'</b>';
  var rb=document.getElementById('reviewBtn'); if(rb) rb.disabled=!(bags>0 && B.window.open);
}
function goReview(){ step="review"; render(); }
function backShop(){ step="shop"; render(); }

function renderReview(){
  var rows="",tot=0,bags=0;
  for(var id in cart){ var p=prod(id),q=cart[id],line=q*p.allIn; tot+=line; bags+=q;
    rows+='<div class="ri"><div style="display:flex;align-items:center;gap:9px">'+bagSvg(p.bag_hex)+'<div>'+esc(p.name)+'<div class="q">'+q+' bag'+(q===1?'':'s')+' &times; '+money(p.allIn)+'</div></div></div><div>'+money(line)+'</div></div>'; }
  var html='<div class="phone"><div class="phead"><h1>Review order</h1><div class="sub">'+esc(B.customer.name)+' · '+esc(B.dealer)+'</div></div>'+
    '<div class="pbody" style="padding-bottom:96px">'+rows+
    '<div class="tot"><div>Total · '+bags+' bags</div><div>'+money(tot)+'</div></div>'+
    '<p class="muted" style="font-size:12px;margin-top:8px">Price includes feed + $'+Number(B.freight).toFixed(2)+'/bag freight.</p></div>'+
    '<div class="cartbar"><button class="btn ghost" onclick="backShop()">&larr; Back</button>'+
    '<button class="btn primary" id="placeBtn" onclick="placeOrder()">Place order</button></div></div>';
  document.getElementById("app").innerHTML=html;
}
function placeOrder(){
  var btn=document.getElementById("placeBtn"); if(btn){ btn.disabled=true; btn.textContent="Saving..."; }
  var items=Object.keys(cart).map(function(id){return {id:id,qty:cart[id]};});
  fetch("/api/order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:TOKEN,items:items})})
    .then(function(r){return r.json();}).then(function(d){
      if(d.ok){ lastBags=d.bags; step="conf"; render(); }
      else { alert(d.error||"Something went wrong."); if(btn){btn.disabled=false;btn.textContent="Place order";} }
    })
    .catch(function(){ alert("Connection problem — your order wasn't sent. Please try again."); if(btn){btn.disabled=false;btn.textContent="Place order";} });
}
function renderConf(){
  var html='<div class="phone"><div class="conf"><div class="ck">&#10003;</div><h3 style="font-size:19px">Order received</h3>'+
    '<p class="muted" style="margin-top:6px">Thanks, '+esc(B.customer.name)+'.</p>'+
    '<p class="muted">'+lastBags+' bags on the '+esc(B.cycle.label)+' cycle.</p>'+
    '<div class="selbar" style="margin-top:18px;text-align:left;display:block"><b>What happens next</b>'+
    '<div class="muted" style="font-size:13px;margin-top:6px">1. Your order is on this cycle now.<br>2. '+esc(B.cycle.close_day)+' '+esc(B.cycle.close_time)+' the cycle closes and the order goes to the mill.<br>3. Your itemized invoice follows.</div></div>'+
    '<button class="btn primary" style="margin-top:20px;width:100%" onclick="step=\'shop\';render()">Review or change my order</button>'+
    '<p class="muted" style="font-size:12px;margin-top:12px">Bookmark this link — it always opens your order for the current cycle.</p></div></div>';
  document.getElementById("app").innerHTML=html;
}
load();
</script>
</body>
</html>
