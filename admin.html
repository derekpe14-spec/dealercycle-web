<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DealerCycle — Dealer</title>
<link rel="icon" href="/favicon.svg">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#2F6B3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DealerCycle">
<link rel="apple-touch-icon" href="/dc-icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&display=swap">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="appbar">
  <div class="brand"><span class="dot"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F5EEDD" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg></span><div><span class="brandmark">DealerCycle</span> <small>dealer back office</small></div></div>
  <div class="switch" id="switch"></div>
</header>
<div class="wrap" id="view"></div>
<div id="overlay"></div>
<script>
"use strict";
var PASS = localStorage.getItem("dc_pass") || "";
var D = null;                 // admin data
var view = "dashboard";
var dealerTab = "product";
var custScreen = "list";
var priceOpenCat = null;

var TABS = [["dashboard","Dashboard"],["customers","Customers"],["pricing","Pricing"],["inventory","Inventory"],["invoices","Invoices"],["payments","Payments"],["payables","Payables"],["billing","Billing"],["check","Cycle check"],["outbox","Outbox"],["setup","Setup"],["network","Umbarger"]];

function money(n){ return "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function money0(n){ return "$"+Math.round(n).toLocaleString("en-US"); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }
function bagSvg(hex,sz){ sz=sz||.8; var w=24*sz,h=28*sz;
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 24 28" style="flex-shrink:0;vertical-align:middle"><path d="M4 6 Q12 1 20 6 L20 24 Q20 26.5 17.5 26.5 L6.5 26.5 Q4 26.5 4 24 Z" fill="'+hex+'" stroke="rgba(0,0,0,.28)" stroke-width="1"/></svg>'; }
function toast(m){ var t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(function(){t.remove();},2200); }

function api(path, method, body){
  return fetch(path,{method:method||"GET",headers:{"Content-Type":"application/json","x-dc-pass":PASS},body:body?JSON.stringify(body):undefined})
    .then(function(r){ if(r.status===401){ promptPass(true); throw new Error("unauth"); } return r.json(); });
}
function refresh(){ return api("/api/admin/data").then(function(d){ D=d; renderTabs(); render(); }); }

/* ---------- passcode gate ---------- */
function promptPass(failed){
  var ab=document.querySelector(".appbar"); if(ab) ab.style.display="none";
  document.getElementById("switch").innerHTML="";
  document.getElementById("view").innerHTML='<div class="loginwrap"><div class="loginbig">'+
    '<div class="spin"><svg viewBox="0 0 24 22" fill="none" stroke="#F5EEDD" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg></div>'+
    '<div class="core">'+
    '<div class="lc-brand">Dealer<span>Cycle</span></div>'+
    '<div class="lc-tag">DEALER SIGN-IN</div>'+
    (failed?'<div class="lc-err">Wrong passcode — try again.</div>':'')+
    '<input id="passin" class="lc-pass" type="password" placeholder="passcode">'+
    '<button class="lc-go" onclick="doLogin()">Sign in &rarr;</button>'+
    '<div class="lc-foot">Enter your dealer passcode</div>'+
    '</div></div></div>';
  var el=document.getElementById("passin"); if(el){ el.focus(); el.onkeydown=function(e){ if(e.key==="Enter") doLogin(); }; }
}
function doLogin(){ PASS=document.getElementById("passin").value.trim(); localStorage.setItem("dc_pass",PASS); refresh().catch(function(){}); }

function renderTabs(){
  var ab=document.querySelector(".appbar"); if(ab) ab.style.display="";
  document.getElementById("switch").innerHTML=TABS.map(function(t){return '<button class="'+(view===t[0]?'active':'')+'" onclick="go(\''+t[0]+'\')">'+t[1]+'</button>';}).join("");
}
function go(v){ view=v; renderTabs(); render(); }

/* =================== DASHBOARD =================== */
function render(){
  if(view==="dashboard") return renderDash();
  if(view==="customers") return renderCustomers();
  if(view==="pricing") return renderPricing();
  if(view==="inventory") return renderInventory();
  if(view==="invoices") return renderInvoices();
  if(view==="payments") return renderPayments();
  if(view==="payables") return renderPayables();
  if(view==="billing") return renderBilling();
  if(view==="check") return renderCheck();
  if(view==="outbox") return renderOutbox();
  if(view==="setup") return renderSetup();
  if(view==="network") return renderNetwork();
}
function mailBadge(){
  var p=D.mail_provider;
  if(p==="outbox") return '<span class="pill warn">Email: preview (Outbox)</span>';
  return '<span class="pill live">Email: sending via '+esc(p)+'</span>';
}
function kpi(v,l,d){ return '<div class="kpi"><div class="v">'+v+'</div><div class="l">'+l+'</div>'+(d?'<div class="d">'+d+'</div>':'')+'</div>'; }
function dtab(id,label){ return '<button class="'+(dealerTab===id?'active':'')+'" onclick="dealerTab=\''+id+'\';renderDash()">'+label+'</button>'; }

function renderDash(){
  var bags=D.tally.reduce(function(a,r){return a+r.bags;},0);
  var rev=D.orders.reduce(function(a,o){return a+o.total;},0);
  var prof=D.pricing; var profMap={}; prof.forEach(function(p){profMap[p.id]=p.margin;});
  var profit=D.tally.reduce(function(a,r){return a+r.bags*(profMap[r.id]||0);},0);
  var k='<div class="kpis">'+kpi(D.orders.length,"Customers ordered","of "+D.customers.length+" on file")+
    kpi(bags,"Total bags","live cycle")+kpi(D.tally.length,"Line items","distinct products")+
    kpi(money0(rev),"Cycle revenue","all-in")+kpi(money0(profit),"Est. gross profit","product margin")+'</div>';
  var ckb=computeCheck();
  var checkBanner=ckb.needsInvoice.length?'<div class="panel" style="border-left:4px solid var(--red)"><div class="pad" style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap"><span><b style="color:var(--red)">⚠ '+ckb.needsInvoice.length+' order(s) need an invoice</b> — don’t let anyone be missed.</span><button class="btn primary sm" onclick="go(\'check\')">Open cycle check</button></div></div>':'';
  var content="";
  if(dealerTab==="product"){
    content='<table><thead><tr><th>Product</th><th class="hide-sm">Category</th><th class="num">Bags</th><th class="num">Revenue</th></tr></thead><tbody>'+
      D.tally.map(function(r){return '<tr><td><span class="bag-td">'+bagSvg(r.bag_hex)+esc(r.name)+'</span></td><td class="hide-sm"><span class="pill cat" style="background:'+(D.categoryColors[r.category]||'#888')+'">'+esc(r.category)+'</span></td><td class="num"><b>'+r.bags+'</b></td><td class="num">'+money0(r.revenue)+'</td></tr>';}).join("")+
      (D.tally.length?'':'<tr><td colspan="4" class="muted" style="padding:24px;text-align:center">No orders yet this cycle.</td></tr>')+'</tbody></table>';
  } else if(dealerTab==="customer"){
    content='<table><thead><tr><th>Customer</th><th class="hide-sm">Items</th><th class="num">Bags</th><th class="num">Total</th></tr></thead><tbody>'+
      D.orders.map(function(o){ var names=o.items.map(function(i){return esc(i.name)+" ×"+i.qty;}).join(", ");
        return '<tr><td><b>'+esc(o.customer)+'</b>'+(o.has_invoice?' <span class="pill live">invoiced</span>':'')+'</td><td class="muted hide-sm" style="font-size:12.5px">'+names+'</td><td class="num">'+o.bags+'</td><td class="num">'+money0(o.total)+'</td></tr>';}).join("")+
      (D.orders.length?'':'<tr><td colspan="4" class="muted" style="padding:24px;text-align:center">No orders yet this cycle.</td></tr>')+'</tbody></table>';
  } else {
    content='<pre class="mill" id="millpre">Loading…</pre>';
    api("/api/admin/mill").then(function(d){ var el=document.getElementById("millpre"); if(el) el.textContent=d.text; });
  }
  var actionBar='<div style="display:flex;gap:8px;flex-wrap:wrap">'+
    '<button class="btn primary sm" onclick="cycleOpen()">Email order link to all customers</button>'+
    '<button class="btn ghost sm" onclick="genInvoices()">Generate invoices for this cycle</button>'+
    '<button class="btn ghost sm" onclick="sendMill()">Email mill order</button>'+
    (dealerTab==="mill"?'<button class="btn ghost sm" onclick="copyMill()">Copy mill order</button>':'')+'</div>';
  var _frMk=(Number(D.settings.freight)||0)-(Number(D.settings.freight_cost)||0);
  var _cpm=30.44/((Number(D.settings.frequency_days)||14));
  var _cycInc=bags*_frMk, _moInc=_cycInc*_cpm;
  var _ovl=D.settings.freight_overhead||[]; var _ovt=_ovl.reduce(function(a,o){return a+(Number(o.amount)||0);},0);
  var _net=_moInc-_ovt;
  var freightPanel=(_frMk>0||_ovt>0)?('<div class="panel"><div class="panel-h"><h3>Freight</h3><span class="hint">markup '+money(_frMk)+'/bag vs monthly overhead</span></div><div class="pad" style="font-size:13.5px">'+
    '<div style="display:flex;justify-content:space-between;padding:3px 0"><span>Freight markup income — this cycle ('+bags+' bags &times; '+money(_frMk)+')</span><b>'+money(_cycInc)+'</b></div>'+
    '<div style="display:flex;justify-content:space-between;padding:3px 0"><span class="muted">Est. monthly markup income (&asymp;'+_cpm.toFixed(1)+' cycles)</span><span class="muted">'+money(_moInc)+'</span></div>'+
    _ovl.map(function(o){return '<div style="display:flex;justify-content:space-between;padding:3px 0;color:#9C0006"><span>&minus; '+esc(o.label||"Overhead")+' (monthly)</span><span>'+money(Number(o.amount)||0)+'</span></div>';}).join("")+
    '<div style="display:flex;justify-content:space-between;padding:7px 0;margin-top:4px;border-top:1px solid #e7ddc9;font-weight:bold;color:'+(_net>=0?'#2F6B3A':'#9C0006')+'"><span>Net freight / month</span><span>'+money(_net)+'</span></div>'+
    '<p class="muted" style="font-size:11.5px;margin:6px 0 0">Set freight cost, markup &amp; overhead in the Pricing tab.</p></div></div>'):'';
  document.getElementById("view").innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><h2 class="sec" style="margin:0">Dealer dashboard · '+esc(D.settings.dealer_name)+'</h2>'+mailBadge()+'</div>'+k+checkBanner+freightPanel+
    '<div class="panel"><div class="panel-h"><h3>Cycle delivering '+esc(D.cycle.delivery_label)+'</h3><span class="pill '+(D.window.open?'live':'warn')+'">'+(D.window.open?'● ORDERING OPEN':'ORDERING CLOSED')+'</span></div>'+
    '<div class="tabs">'+dtab("product","By product")+dtab("customer","By customer")+dtab("mill","Order to mill")+'</div>'+content+
    '<div class="pad" style="padding-top:0">'+actionBar+'</div></div>';
}
function genInvoices(){ api("/api/admin/invoices/generate","POST",{}).then(function(d){ toast(d.made+" invoice(s) generated"+(d.emailed?(", "+d.emailed+" emailed"):"")+"."); refresh(); }); }
function cycleOpen(){ if(!confirm("Email every customer (with an email on file) their private order link for this cycle?")) return; api("/api/admin/cycle-open","POST",{}).then(function(d){ toast("Order link: "+d.sent+" sent, "+d.captured+" to Outbox, "+d.noEmail+" had no email."); refresh(); }); }
function copyMill(){ var t=document.getElementById("millpre").textContent; navigator.clipboard.writeText(t).then(function(){toast("Mill order copied.");}); }

/* =================== CUSTOMERS =================== */
function renderCustomers(){
  if(custScreen==="add") return renderCustForm();
  var origin=location.origin;
  var dealer=(D.settings&&D.settings.dealer_name)||"your dealer";
  var sorted=D.customers.slice().sort(function(a,b){ return String(a.name||"").localeCompare(String(b.name||""),"en",{sensitivity:"base"}); });
  var rows=sorted.map(function(c){
    var link=origin+"/o/"+c.link_token;
    var ph=(c.phone||"").replace(/[^0-9+]/g,"");
    var smsBody="Hi "+(c.name||"")+"! This is your personal "+dealer+" feed order link - save this text and use this SAME link every cycle to place your order:\n"+link+"\n\nTip: add it to your phone's home screen so it opens like an app. Open the link, then on iPhone tap the Share icon and pick 'Add to Home Screen'; on Android tap the menu (3 dots) and pick 'Add to Home Screen'.";
    var textBtn=ph?'<a class="btn ghost sm" style="background:#e6f2e6;color:#2F6B3A" href="sms:'+ph+'?&body='+encodeURIComponent(smsBody)+'">Text</a>':'';
    return '<tr><td><b>'+esc(c.name)+'</b>'+(c.email?'<div class="muted" style="font-size:12px">'+esc(c.email)+'</div>':'')+'</td>'+
      '<td class="hide-sm">'+(esc(c.phone)||'<span class="muted">—</span>')+'</td>'+
      '<td><span class="pill cat" style="background:#3D8FCE">'+esc(c.payment_method||'—')+'</span></td>'+
      '<td><div class="linkrow"><button class="btn ghost sm" onclick="copyLink(\''+link+'\')">Copy link</button>'+
      textBtn+
      '<a class="btn ghost sm" href="'+link+'" target="_blank">Open</a>'+
      '<button class="btn ghost sm" onclick="editCust('+c.id+')">Edit</button></div></td></tr>';
  }).join("");
  document.getElementById("view").innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'+
    '<h2 class="sec" style="margin:0">Customers · '+D.customers.length+' on file</h2>'+
    '<button class="btn primary sm" onclick="custScreen=\'add\';editId=null;renderCustomers()">+ Add customer</button></div>'+
    '<div class="panel"><div class="panel-h"><h3>Roster</h3><span class="hint">each customer has a private order link</span></div>'+
    '<div style="overflow-x:auto"><table><thead><tr><th>Name</th><th class="hide-sm">Phone</th><th>Payment</th><th>Private link</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'+
    '<p class="muted" style="font-size:12.5px;margin-top:12px">Text or email a customer their private link. It always opens their own order for the current cycle — no roster browsing, no login.</p>';
}
var editId=null;
function editCust(id){ editId=id; custScreen="add"; renderCustomers(); }
function renderCustForm(){
  var c=editId?D.customers.find(function(x){return x.id===editId;}):{name:"",phone:"",email:"",address:"",payment_method:"Check",payment_detail_label:""};
  function f(label,key,ph){ return '<div class="field"><label>'+label+'</label><input id="f_'+key+'" value="'+esc(c[key]||"")+'" placeholder="'+(ph||"")+'"></div>'; }
  document.getElementById("view").innerHTML='<h2 class="sec">'+(editId?"Edit customer":"Add a customer")+'</h2>'+
    '<div class="panel" style="max-width:560px"><div class="pad">'+
    f("Customer name *","name","Full name")+f("Address","address","Street, City, State ZIP")+f("Phone","phone","(502) 555-0123")+f("Email","email","name@example.com")+
    '<div class="field"><label>Payment method</label><select id="f_payment_method">'+["Check","Venmo","Cash","ACH"].map(function(o){return '<option'+(c.payment_method===o?' selected':'')+'>'+o+'</option>';}).join("")+'</select></div>'+
    f("Payment detail (label only — no bank numbers)","payment_detail_label","e.g. @handle · check on file")+
    '<div style="display:flex;gap:10px;margin-top:8px;align-items:center"><button class="btn ghost" onclick="custScreen=\'list\';renderCustomers()">Cancel</button>'+
    '<button class="btn primary" onclick="saveCust()">Save</button>'+
    (editId?'<button class="btn ghost sm" style="margin-left:auto;color:var(--red);border-color:#e6c9c2" onclick="deleteCust('+editId+',\''+esc(c.name).replace(/'/g,"\\'")+'\')">Delete customer</button>':'')+
    '</div></div></div>';
}
function deleteCust(id,name){
  if(!confirm("Delete "+name+"? This also removes their orders, invoices, and payments. Their private link will stop working. This cannot be undone.")) return;
  api("/api/admin/customer/delete","POST",{id:id}).then(function(r){
    if(r&&r.error){ toast("Could not delete."); return; }
    custScreen="list"; editId=null; toast("Customer deleted."); refresh();
  });
}
function saveCust(){
  var b={id:editId||undefined};
  ["name","address","phone","email","payment_method","payment_detail_label"].forEach(function(k){ var el=document.getElementById("f_"+k); if(el) b[k]=el.value.trim(); });
  if(!b.name){ toast("Name is required."); return; }
  api("/api/admin/customer","POST",b).then(function(){ custScreen="list"; toast("Saved."); refresh(); });
}
function copyLink(l){ navigator.clipboard.writeText(l).then(function(){toast("Link copied.");}); }

/* =================== PRICING =================== */
function renderPricing(){
  var s=D.settings, basisSrp=s.pricing_basis==="srp";
  // group products by division (category), in the dealer's category order
  var byCat={}; D.pricing.forEach(function(p){ (byCat[p.category]=byCat[p.category]||[]).push(p); });
  var order=(D.categoryOrder||[]).filter(function(c){return byCat[c] && byCat[c].length;});
  Object.keys(byCat).forEach(function(c){ if(order.indexOf(c)<0) order.push(c); });
  if(priceOpenCat===null) priceOpenCat=order[0]||"";   // open the first division by default
  var cats=order.map(function(name){
    var items=byCat[name]; var open=priceOpenCat===name;
    var rows=items.map(function(p){
      return '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)">'+
        '<span class="bag-td" style="min-width:0">'+bagSvg(p.bag_hex)+'<span style="min-width:0"><span style="font-weight:500">'+esc(p.name)+'</span>'+
        '<span class="muted hide-sm" style="font-size:11.5px;display:block">cost '+money(p.wholesale)+' · SRP '+money(p.srp)+'</span></span></span>'+
        '<span style="text-align:right;white-space:nowrap"><b style="color:var(--navy);font-size:15px">'+money(p.allIn)+'</b>'+
        '<span class="muted" style="font-size:11px;display:block">base '+money(p.base)+' · <span style="color:var(--green)">+'+money(p.margin)+'</span>/bag</span></span></div>';
    }).join("");
    return '<div class="cat'+(open?' open':'')+'"><div class="cat-h" onclick="togglePriceCat(\''+esc(name)+'\')">'+
      '<div class="l"><span class="swatch" style="background:'+(D.categoryColors[name]||'#888')+'"></span>'+esc(name)+'</div>'+
      '<div style="display:flex;align-items:center;gap:10px"><span class="cnt">'+items.length+'</span><span class="chev">&#9654;</span></div></div>'+
      '<div class="cat-body">'+rows+'</div></div>';
  }).join("");
  var ctl='<div class="panel"><div class="panel-h"><h3>Your pricing rules</h3><span class="hint">save → customer prices update</span></div><div class="pad"><div class="ctlgrid">'+
    '<div class="field"><label>Pricing basis</label><select id="p_basis"><option value="srp"'+(basisSrp?' selected':'')+'>% off Umbarger SRP</option><option value="cost"'+(!basisSrp?' selected':'')+'>Markup % on cost</option></select></div>'+
    '<div class="field"><label id="p_marginlbl">'+(basisSrp?'Discount off SRP (%)':'Markup on cost (%)')+'</label><input id="p_margin" type="number" step="0.5" value="'+s.margin_pct+'"></div>'+
    '<div class="field"><label>Freight cost ($/bag)</label><input id="p_freightcost" type="number" step="0.05" value="'+(s.freight_cost!=null?s.freight_cost:0)+'" oninput="updCharged()"></div>'+
    '<div class="field"><label>Freight markup ($/bag)</label><input id="p_freightmk" type="number" step="0.05" value="'+(((Number(s.freight)||0)-(Number(s.freight_cost)||0)).toFixed(2))+'" oninput="updCharged()"></div>'+
    '<div class="field"><label>Charged to customer</label><div style="height:43px;display:flex;align-items:center;font-weight:600;color:var(--navy)" id="p_charged">'+money(Number(s.freight)||0)+'/bag</div></div>'+
    '<div class="field"><label>Sales tax</label><div style="display:flex;gap:10px;align-items:center;height:43px"><label class="checkrow"><input type="checkbox" id="p_taxen" '+(s.tax_enabled?'checked':'')+'> charge</label><input id="p_taxpct" type="number" step="0.25" value="'+s.tax_pct+'" style="width:80px"> %</div></div>'+
    '</div><button class="btn primary sm" style="margin-top:10px" onclick="savePricing()">Save pricing</button></div></div>';
  var imp='<div class="panel"><div class="panel-h"><h3>Update prices from Umbarger sheet</h3><span class="hint">paste → preview → apply</span></div><div class="pad">'+
    '<p class="muted" style="font-size:13px;margin:0 0 8px">When Umbarger sends a new price sheet, paste three columns here — <b>Product name</b>, <b>Cost $/bag</b>, <b>Suggested Retail $/bag</b> — one product per line (copy straight from their spreadsheet, or type them). Tabs or commas both work. I&#39;ll match them to your catalog and show exactly what changes before anything is saved.</p>'+
    '<textarea id="imp_text" rows="6" style="width:100%;font-family:Menlo,Consolas,monospace;font-size:12.5px" placeholder="Primer Plus, 15.15, 17.65&#10;Barley Base, 15.53, 18.03&#10;Cattlelac, 18.95, 21.45"></textarea>'+
    '<div style="margin-top:8px"><button class="btn primary sm" onclick="previewSheet()">Preview changes</button> <span class="muted" id="imp_status" style="font-size:12.5px"></span></div>'+
    '<div id="imp_result" style="margin-top:10px"></div></div></div>';
  window._ovh = (s.freight_overhead && s.freight_overhead.length) ? s.freight_overhead.slice() : [{label:"Unloading labor",amount:300},{label:"Container rent",amount:100}];
  var ovh='<div class="panel"><div class="panel-h"><h3>Freight overhead (monthly)</h3><span class="hint">what your freight markup pays for</span></div><div class="pad">'+
    '<p class="muted" style="font-size:13px;margin:0 0 8px">The freight <b>markup</b> you charge funds these fixed monthly costs. List them here and the dashboard shows whether your markup is covering them.</p>'+
    '<div id="ovh_rows"></div>'+
    '<div style="display:flex;align-items:center;gap:12px;margin-top:6px"><button class="btn ghost sm" onclick="ovhAdd()">+ Add line</button>'+
    '<span class="muted" style="font-size:13px">Total: <b id="ovh_total">$0.00/mo</b></span>'+

function parsePriceSheet(txt){
  var rows=[];
  (txt||"").split(/\r?\n/).forEach(function(line){
    if(!line.trim()) return;
    var parts = line.indexOf("\t")>=0 ? line.split("\t") : line.split(",");
    parts = parts.map(function(x){return x.replace(/[$]/g,"").replace(/,/g,"").trim();});
    if(parts.length<2) return;
    var name=parts[0]; var nums=parts.slice(1).filter(function(x){return x!==""&&!isNaN(parseFloat(x));});
    if(!name||nums.length<1) return;
    // last two numbers = cost, srp (if only one, treat as srp)
    var srp = nums.length>=2 ? parseFloat(nums[nums.length-1]) : parseFloat(nums[0]);
    var cost = nums.length>=2 ? parseFloat(nums[nums.length-2]) : "";
    rows.push({name:name, wholesale:cost, srp:srp});
  });
  return rows;
}

  var rows=parsePriceSheet(document.getElementById("imp_text").value);
  if(!rows.length){ document.getElementById("imp_status").textContent="Nothing to read — paste some rows first."; return; }

}

function effSurchargePct(){
  var s=D.settings; if(!s.surcharge_enabled) return 0;
  var pct=Number(s.surcharge_pct); if(!(pct>=0)) pct=3; pct=Math.min(pct,3);
  var caps={CT:0,MA:0,ME:0,PR:0,CO:2,IL:1}; var st=String(s.dealer_state||"").toUpperCase();
  if(Object.prototype.hasOwnProperty.call(caps,st)) pct=Math.min(pct,caps[st]);
  return pct;
}

  var badge=live?'<span class="pill live">Stripe: live</span>':'<span class="pill warn">Stripe: simulated (no key)</span>';
  var statusPanel;
  if(sub && sub.status==="active"){
    statusPanel='<div class="panel" style="border-left:4px solid var(--green)"><div class="pad">'+
      '<b style="color:var(--green)">✓ Subscribed</b> — '+(sub.method==="card"?"paying by credit card":"paying by bank (ACH)")+', since '+esc(sub.started_at||"")+'.'+
      '<div class="muted" style="font-size:12.5px;margin-top:6px">'+money(intro)+'/mo for the first '+months+' months, then '+money(list)+'/mo.</div>'+
      '<button class="btn ghost sm" style="margin-top:10px;border-color:var(--red);color:var(--red)" onclick="cancelSub()">Cancel subscription</button>'+

/* =================== CYCLE CHECK (safeguard) =================== */
function computeCheck(){
  var cyc=D.cycle.delivery_label;
  var ordered=D.orders;                                   // submitted orders, current cycle
  var needsInvoice=ordered.filter(function(o){return !o.has_invoice;});
  var unpaid=(D.payments||[]).filter(function(p){return p.cycle===cyc && !p.paid;});
  var orderedIds={}; ordered.forEach(function(o){orderedIds[o.customer_id]=true;});
  var notOrdered=D.customers.filter(function(c){return !orderedIds[c.id];});
  return {cyc:cyc, ordered:ordered, needsInvoice:needsInvoice, unpaid:unpaid, notOrdered:notOrdered};
}

  var ck=computeCheck();
  var clear=ck.needsInvoice.length===0;

      :'<div class="pad muted">None — every order is invoiced. ✓</div>')+'</div>';
  var s2='<div class="panel"><div class="panel-h"><h3>Invoiced — awaiting payment ('+esc(ck.cyc)+')</h3><span class="hint">'+ck.unpaid.length+'</span></div>'+
    (ck.unpaid.length?'<div style="overflow-x:auto"><table><thead><tr><th>Customer</th><th class="hide-sm">Invoice</th><th class="num">Amount</th></tr></thead><tbody>'+
      ck.unpaid.map(function(p){return '<tr><td><b>'+esc(p.customer_name)+'</b></td><td class="hide-sm muted">'+esc(p.invoice_num)+'</td><td class="num">'+money(p.amount)+'</td></tr>';}).join("")+'</tbody></table></div>'+
      '<div class="pad" style="padding-top:8px"><button class="btn ghost sm" onclick="go(\'payments\')">Open payment tracker</button></div>'
      :'<div class="pad muted">None outstanding for this cycle. ✓</div>')+'</div>';
  var s3='<div class="panel"><div class="panel-h"><h3>Hasn’t ordered yet</h3><span class="hint">'+ck.notOrdered.length+' of '+D.customers.length+'</span></div>'+

      :'<div class="pad muted">Everyone on file has ordered this cycle. ✓</div>')+'</div>';
  document.getElementById("view").innerHTML='<h2 class="sec" style="margin:0 0 4px">Cycle check · '+esc(ck.cyc)+'</h2>'+
    '<p class="sub-h">One glance to confirm nobody slips through: every order becomes an invoice, every invoice lands in the tracker.</p>'+
    banner+s1+s2+s3;
}

/* =================== INVENTORY (prototype) =================== */
function renderInventory(){
  if(!D.inventory_enabled){
    document.getElementById("view").innerHTML='<h2 class="sec">Inventory</h2>'+
      '<div class="panel"><div class="pad">'+
      '<p style="font-size:14px;line-height:1.6">DealerCycle can track the stock you physically carry — on hand, committed, and available — updating live as orders, walk-in sales, receipts and cancellations happen. QuickBooks receives only the money side, so this works on <b>any</b> QuickBooks plan.</p>'+
      '<p class="muted" style="font-size:12.5px">Turn it on for dealers who stock product. Relay-only dealers can leave it off.</p>'+
      '<button class="btn primary" onclick="toggleInventory(true)">Enable inventory tracking</button>'+
      '</div></div>';
    return;
  }
  var inv=D.inventory||[];
  var low=inv.filter(function(i){return i.low;});
  var units=inv.reduce(function(a,i){return a+i.on_hand;},0);
  var value=inv.reduce(function(a,i){return a+i.value;},0);
  var k='<div class="kpis">'+kpi(inv.length,"Products carried","")+
    kpi(units.toLocaleString(),"Units on hand","across all SKUs")+
    kpi(money0(value),"Stock value","at avg cost")+
    kpi(low.length,"Low stock",(low.length?"need reorder":"all healthy"))+'</div>';
  var lowBanner=low.length?'<div class="panel" style="border-left:4px solid var(--red)"><div class="pad"><b style="color:var(--red)">⚠ '+low.length+' product(s) at or below reorder point</b> — '+low.map(function(i){return esc(i.name)+" ("+i.available+")";}).join(", ")+'</div></div>':'';
  var rows=inv.map(function(i){
    return '<div style="padding:12px 14px;border-bottom:1px solid var(--border)'+(i.low?';background:#fdf3e6':'')+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'+
      '<span class="bag-td" style="min-width:0">'+bagSvg(i.bag_hex)+'<span style="font-weight:600">'+esc(i.name)+'</span>'+(i.low?' <span class="pill warn">LOW</span>':'')+'</span>'+
      '<span style="text-align:right;white-space:nowrap"><b style="font-size:17px;color:var(--navy)">'+i.available+'</b><div class="muted" style="font-size:10.5px">available</div></span></div>'+
      '<div class="muted" style="font-size:12px;margin-top:4px">on hand '+i.on_hand+' · committed '+i.committed+' · reorder at '+i.reorder_point+' · avg '+money(i.avg_cost)+'</div>'+
      '<div class="linkrow" style="margin-top:8px"><button class="btn ghost sm" onclick="invReceive(\''+i.product_id+'\')">Receive</button>'+
      '<button class="btn ghost sm" onclick="invAdjust(\''+i.product_id+'\')">Adjust</button>'+
      '<button class="btn ghost sm" onclick="invEdit(\''+i.product_id+'\')">Reorder</button></div></div>';
  }).join("")||'<div class="pad muted" style="text-align:center;padding:24px">No products carried yet. Add one below.</div>';
  var carried={}; inv.forEach(function(i){carried[i.product_id]=true;});
  var addOpts=D.pricing.filter(function(p){return !carried[p.id];}).map(function(p){return '<option value="'+p.id+'">'+esc(p.name)+'</option>';}).join("");
  var addPanel='<div class="panel"><div class="panel-h"><h3>Carry a new product</h3></div><div class="pad"><div class="ctlgrid">'+
    '<div class="field"><label>Product</label><select id="iv_prod">'+(addOpts||'<option value="">All products already carried</option>')+'</select></div>'+
    '<div class="field"><label>Opening count</label><input id="iv_open" type="number" min="0" step="1" placeholder="0"></div>'+
    '<div class="field"><label>Unit cost ($, optional)</label><input id="iv_cost" type="number" min="0" step="0.01" placeholder="wholesale"></div>'+
    '<div class="field"><label>Reorder point</label><input id="iv_rp" type="number" min="0" step="1" placeholder="10"></div>'+
    '</div><button class="btn primary sm" style="margin-top:8px" onclick="invAddItem()">Add to inventory</button></div></div>';
  var ql=(D.qbo_log||[]);
  var qboRows=ql.length?ql.slice(0,12).map(function(q){return '<tr><td><span class="pill cat" style="background:#2CA01C">'+esc(q.txn)+'</span></td><td style="font-size:12.5px">'+esc(q.detail)+'</td><td class="num">'+(q.amount==null?'—':money(q.amount))+'</td><td class="muted hide-sm" style="font-size:11.5px">'+(q.at||'').slice(0,16).replace("T"," ")+'</td></tr>';}).join(""):'<tr><td colspan="4" class="muted" style="padding:18px;text-align:center">Nothing posted yet.</td></tr>';
  var qboPanel='<div class="panel"><div class="panel-h"><h3>What would post to QuickBooks</h3><span class="hint">money only · prototype preview</span></div><div style="overflow-x:auto"><table><thead><tr><th>Txn</th><th>Detail</th><th class="num">Amount</th><th class="hide-sm">When</th></tr></thead><tbody>'+qboRows+'</tbody></table></div></div>';
  var mv=(D.stock_movements||[]);
  var mvRows=mv.length?mv.slice(0,15).map(function(m){var sign=m.qty>0?'+':'';return '<tr><td style="font-size:12.5px"><b>'+esc(m.product_name)+'</b></td><td><span class="pill cat" style="background:'+mvColor(m.type)+'">'+esc(m.type)+'</span></td><td class="num '+(m.qty>0?'':'')+'" style="color:'+(m.qty>0?'var(--green)':(m.qty<0?'var(--red)':'var(--muted)'))+'">'+sign+m.qty+'</td><td class="num hide-sm">'+m.balance_after+'</td><td class="muted hide-sm" style="font-size:11.5px">'+esc(m.reason||"")+'</td></tr>';}).join(""):'<tr><td colspan="5" class="muted" style="padding:18px;text-align:center">No movements yet.</td></tr>';
  var mvPanel='<div class="panel"><div class="panel-h"><h3>Stock movement log</h3><span class="hint">most recent</span></div><div style="overflow-x:auto"><table><thead><tr><th>Product</th><th>Type</th><th class="num">Qty</th><th class="num hide-sm">Balance</th><th class="hide-sm">Reason</th></tr></thead><tbody>'+mvRows+'</tbody></table></div></div>';
  document.getElementById("view").innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><h2 class="sec" style="margin:0">Inventory · '+esc(D.settings.dealer_name)+'</h2>'+
    '<button class="btn primary sm" onclick="openQuickSale()">+ Walk-in sale</button></div>'+
    '<p class="sub-h">Live stock — updates as orders are invoiced, walk-in sales ring up, shipments arrive, and no-shows are cancelled.</p>'+k+lowBanner+
    '<div class="panel"><div class="panel-h"><h3>On-hand by product</h3><span class="hint">available = on hand − committed</span></div>'+rows+'</div>'+
    addPanel+qboPanel+mvPanel;
}
function mvColor(t){ return {receive:"#2F6B3A",fulfill:"#C26B2D",return:"#3D8FCE","write_off":"#a3271f",adjust:"#7a6f5a"}[t]||"#888"; }
function toggleInventory(on){ api("/api/admin/settings","POST",{inventory_enabled:!!on}).then(function(){ toast(on?"Inventory tracking on.":"Inventory off."); refresh(); }); }
function invAddItem(){
  var pid=document.getElementById("iv_prod").value; if(!pid){ toast("Pick a product."); return; }
  var b={product_id:pid, opening_qty:Number(document.getElementById("iv_open").value)||0, reorder_point:Number(document.getElementById("iv_rp").value)||0};
  var c=document.getElementById("iv_cost").value; if(c!=="") b.unit_cost=Number(c);
  api("/api/admin/inventory/item","POST",b).then(function(d){ if(d&&d.ok){toast("Now carrying it.");refresh();} else {toast((d&&d.error)||"Could not add.");} });
}
function invEdit(pid){
  var i=(D.inventory||[]).find(function(x){return x.product_id===pid;}); if(!i)return;
  showModal('<h3 style="color:var(--navy)">Reorder rule · '+esc(i.name)+'</h3>'+
    '<div class="ctlgrid" style="margin-top:8px"><div class="field"><label>Reorder point</label><input id="m_rp" type="number" min="0" value="'+i.reorder_point+'"></div>'+
    '<div class="field"><label>Reorder qty</label><input id="m_rq" type="number" min="0" value="'+i.reorder_qty+'"></div></div>'+
    '<div style="margin-top:12px;display:flex;gap:8px"><button class="btn primary sm" onclick="invSaveRule(\''+pid+'\')">Save</button>'+
    '<button class="btn ghost sm" onclick="closeModal()">Cancel</button>'+
    '<button class="btn ghost sm" style="margin-left:auto;color:var(--red)" onclick="invStop(\''+pid+'\',\''+esc(i.name).replace(/\x27/g,"")+'\')">Stop carrying</button></div>');
}
function invSaveRule(pid){ api("/api/admin/inventory/item","POST",{product_id:pid,reorder_point:Number(document.getElementById("m_rp").value)||0,reorder_qty:Number(document.getElementById("m_rq").value)||0}).then(function(){toast("Saved.");closeModal();refresh();}); }
function invStop(pid,name){ if(!confirm("Stop carrying "+name+"? Its stock history stays in the log."))return; api("/api/admin/inventory/remove","POST",{product_id:pid}).then(function(){toast("Stopped carrying "+name+".");closeModal();refresh();}); }
function invReceive(pid){
  var i=(D.inventory||[]).find(function(x){return x.product_id===pid;}); if(!i)return;
  showModal('<h3 style="color:var(--navy)">Receive shipment · '+esc(i.name)+'</h3>'+
    '<p class="muted" style="font-size:12.5px">On hand now: <b>'+i.on_hand+'</b></p>'+
    '<div class="ctlgrid"><div class="field"><label>Bags received</label><input id="m_qty" type="number" min="1" step="1" placeholder="20"></div>'+
    '<div class="field"><label>Unit cost ($)</label><input id="m_cost" type="number" min="0" step="0.01" placeholder="'+i.avg_cost+'"></div></div>'+
    '<div style="margin-top:12px;display:flex;gap:8px"><button class="btn primary sm" onclick="invDoReceive(\''+pid+'\')">Receive into stock</button><button class="btn ghost sm" onclick="closeModal()">Cancel</button></div>');
}
function invDoReceive(pid){
  var qty=Number(document.getElementById("m_qty").value)||0; if(qty<=0){toast("Enter bags received.");return;}
  var c=document.getElementById("m_cost").value; var line={product_id:pid,qty:qty}; if(c!=="")line.unit_cost=Number(c);
  api("/api/admin/inventory/receive","POST",{items:[line]}).then(function(d){ if(d&&d.ok){toast(d.count+" bags received.");closeModal();refresh();} else {toast((d&&d.error)||"Could not receive.");} });
}
function invAdjust(pid){
  var i=(D.inventory||[]).find(function(x){return x.product_id===pid;}); if(!i)return;
  showModal('<h3 style="color:var(--navy)">Adjust count · '+esc(i.name)+'</h3>'+
    '<p class="muted" style="font-size:12.5px">System shows <b>'+i.on_hand+'</b> on hand. Enter the true physical count.</p>'+
    '<div class="ctlgrid"><div class="field"><label>Actual count</label><input id="m_new" type="number" min="0" step="1" value="'+i.on_hand+'"></div>'+
    '<div class="field"><label>Reason</label><input id="m_reason" placeholder="Cycle count / shrink"></div></div>'+
    '<div style="margin-top:12px;display:flex;gap:8px"><button class="btn primary sm" onclick="invDoAdjust(\''+pid+'\')">Save correction</button><button class="btn ghost sm" onclick="closeModal()">Cancel</button></div>');
}
function invDoAdjust(pid){ api("/api/admin/inventory/adjust","POST",{product_id:pid,new_qty:Number(document.getElementById("m_new").value),reason:(document.getElementById("m_reason").value||"").trim()}).then(function(d){ if(d&&d.ok){toast("Count corrected.");closeModal();refresh();} else {toast((d&&d.error)||"Could not adjust.");} }); }
/* ---- Walk-in / quick sale (in-stock gated) ---- */
var qsLines=[];
function openQuickSale(){
  qsLines=[];
  var avail=(D.inventory||[]).filter(function(i){return i.available>0;});
  if(!avail.length){ showModal('<h3 style="color:var(--navy)">Walk-in sale</h3><p class="muted">Nothing is in stock to sell right now.</p><div style="margin-top:10px"><button class="btn ghost sm" onclick="closeModal()">Close</button></div>'); return; }
  drawQuickSale();
}
function drawQuickSale(){
  var avail=(D.inventory||[]).filter(function(i){return i.available>0;});
  var opts=avail.map(function(i){return '<option value="'+i.product_id+'">'+esc(i.name)+' — '+i.available+' avail</option>';}).join("");
  var lineRows=qsLines.map(function(l,idx){var i=avail.find(function(x){return x.product_id===l.product_id;})||{available:l.qty,name:l.product_id};return '<tr><td style="font-size:12.5px">'+esc(i.name)+'</td><td class="num">'+l.qty+'</td><td><button class="btn ghost sm" onclick="qsDel('+idx+')">✕</button></td></tr>';}).join("");
  showModal('<h3 style="color:var(--navy)">Walk-in / counter sale</h3>'+
    '<p class="muted" style="font-size:12.5px">Only items in stock appear; quantity is capped at what&#39;s available.</p>'+
    '<div class="ctlgrid"><div class="field"><label>Item</label><select id="qs_prod" onchange="qsCap()">'+opts+'</select></div>'+
    '<div class="field"><label>Qty (max <span id="qs_max"></span>)</label><input id="qs_qty" type="number" min="1" step="1" value="1"></div></div>'+
    '<button class="btn ghost sm" onclick="qsAdd()">+ Add line</button>'+
    (qsLines.length?'<table style="margin-top:10px"><thead><tr><th>Item</th><th class="num">Qty</th><th></th></tr></thead><tbody>'+lineRows+'</tbody></table>':'')+
    '<div class="field" style="margin-top:10px"><label>Customer (optional)</label><input id="qs_cust" placeholder="Counter sale"></div>'+
    '<div class="field"><label>Paid by</label><select id="qs_method"><option>Cash</option><option>Check</option><option>Venmo</option><option>Card</option></select></div>'+
    '<div style="margin-top:12px;display:flex;gap:8px"><button class="btn primary sm" onclick="qsSubmit()">Ring up sale</button><button class="btn ghost sm" onclick="closeModal()">Cancel</button></div>');
  qsCap();
}
function qsCap(){ var avail=(D.inventory||[]).filter(function(i){return i.available>0;}); var pid=document.getElementById("qs_prod").value; var i=avail.find(function(x){return x.product_id===pid;}); var max=i?i.available:1; var ms=document.getElementById("qs_max"); if(ms)ms.textContent=max; var q=document.getElementById("qs_qty"); if(q){q.max=max; if(Number(q.value)>max)q.value=max;} }
function qsAdd(){
  var pid=document.getElementById("qs_prod").value; var qty=Number(document.getElementById("qs_qty").value)||0;
  var avail=(D.inventory||[]).find(function(i){return i.product_id===pid;}); if(!avail){return;}
  var already=qsLines.filter(function(l){return l.product_id===pid;}).reduce(function(a,l){return a+l.qty;},0);
  if(qty<=0){toast("Enter a quantity.");return;}
  if(qty+already>avail.available){toast("Only "+avail.available+" available.");return;}
  qsLines.push({product_id:pid,qty:qty}); drawQuickSale();
}
function qsDel(idx){ qsLines.splice(idx,1); drawQuickSale(); }
function qsSubmit(){
  if(!qsLines.length){
    // allow a single quick line straight from the selectors
    var pid=document.getElementById("qs_prod").value; var qty=Number(document.getElementById("qs_qty").value)||0;
    if(pid&&qty>0) qsLines.push({product_id:pid,qty:qty});
  }
  if(!qsLines.length){ toast("Add at least one item."); return; }
  var b={items:qsLines, customer_name:(document.getElementById("qs_cust").value||"").trim(), method:document.getElementById("qs_method").value};
  api("/api/admin/inventory/quicksale","POST",b).then(function(d){ if(d&&d.ok){toast("Sold — "+d.invoice_num+" · "+money(d.total));qsLines=[];closeModal();refresh();} else {toast((d&&d.error)||"Could not complete sale.");} });
}

/* ---------- modal ---------- */
function showModal(html){ document.getElementById("overlay").innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>'; }
function closeModal(){ document.getElementById("overlay").innerHTML=""; }

/* ---------- boot ---------- */
if(!PASS){ promptPass(false); } else { refresh().catch(function(){}); }

/* keep the dashboard current without a manual reload — refresh when the tab
   regains focus and on a gentle poll, but only on the dashboard so we never
   interrupt editing a customer, pricing, etc. */
function autoRefreshOk(){ return PASS && view==="dashboard"; }
window.addEventListener("focus", function(){ if(autoRefreshOk()) refresh().catch(function(){}); });
document.addEventListener("visibilitychange", function(){ if(document.visibilityState==="visible" && autoRefreshOk()) refresh().catch(function(){}); });
setInterval(function(){ if(autoRefreshOk() && document.visibilityState==="visible") refresh().catch(function(){}); }, 45000);
</script>
</body>
</html>
