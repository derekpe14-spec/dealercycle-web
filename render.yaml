# Render Blueprint — deploys DealerCycle as a web service with a persistent disk.
# In Render: New → Blueprint → point at this repo. It reads this file automatically.
# NOTE: every secret/config below is `sync: false`, so the values you set in the
# Render dashboard are the source of truth and are never overwritten by a deploy.
services:
  - type: web
    name: dealercycle
    runtime: node
    plan: starter            # Starter ($7/mo) is needed for the persistent disk below.
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: DATA_DIR
        value: /var/data     # the mounted disk — keeps orders/invoices across deploys
      - key: ADMIN_PASSCODE
        sync: false          # dealer back-office passcode (set in the dashboard)
      - key: BASE_URL
        sync: false          # https://dealercycle.app
      # ---- Email — sent via Resend (resend.com) ----
      - key: EMAIL_PROVIDER
        sync: false          # set to: resend
      - key: RESEND_API_KEY
        sync: false          # API key from the orders@dealercycle.app Resend account
      - key: EMAIL_FROM
        sync: false          # DealerCycle <orders@dealercycle.app>
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
